name: GitHub Actions Continuous Delivery (Alpine Frpc)

on:
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
    tags:
      - "*.*.*"
      - "v*.*.*"
      - "V*.*.*"
      - "alpine-*.*.*"
      - "*.*"
      - "v*.*"
      - "V*.*"
      - "alpine-*.*"
      - "*"
      - "v*"
      - "V*"
      - "alpine-*"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  schedule:
    # Automatically run on every Day
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  buildx:
    runs-on: ubuntu-latest
    steps:
      # - name: Bypass Cloudflare for Github Action Pro
      #   uses: wuuyh/bypass-cloudflare-for-github-action@v0.0.4
      #   with:
      #     mode: 'list'
      #     cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      #     cf_api_token: ${{ secrets.CF_API_TOKEN }}
      #     cf_zone_id: ${{ secrets.CF_ZONE_ID }}
      #     github_api_token: ${{ secrets.GITHUB_TOKEN }}     
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
            # this might remove tools that are actually needed,
            # if set to "true" but frees about 6 GB
            tool-cache: false
            
            # all of these default to true, but feel free to set to
            # "false" if necessary for your workflow
            android: true
            dotnet: true
            haskell: true
            large-packages: true
            docker-images: false
            swap-storage: false      
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Resolve frp version
        id: frp
        shell: bash
        run: |
          tag="$(curl -fsSL https://api.github.com/repos/fatedier/frp/releases/latest | jq -r '.tag_name')"
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "Failed to resolve latest fatedier/frp release" >&2
            exit 1
          fi
          version="${tag#v}"
          minor="${version%.*}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"
          echo "FRP_VERSION=$version" >> "$GITHUB_ENV"
      - # Add support for more platforms with QEMU (optional)
        # https://github.com/docker/setup-qemu-action
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
      - # https://github.com/docker/setup-buildx-action/issues/57#issuecomment-1059657292
        # https://github.com/docker/buildx/issues/136#issuecomment-550205439
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          buildkitd-config: .github/buildkitd.toml
      - name: Validate DockerHub secrets
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          if [[ -z "$DOCKER_HUB_USERNAME" || -z "$DOCKER_HUB_TOKEN" ]]; then
            echo "DOCKER_HUB_USERNAME and DOCKER_HUB_TOKEN secrets are required to publish Docker images." >&2
            exit 1
          fi
      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            name=wuuyh/frpc,enable=true
          flavor: |
            latest=false  
            prefix=
            suffix=
          tags: |
            type=ref,enable=${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && github.event_name != 'schedule' }},priority=600,prefix=,suffix=,event=branch
            type=edge,enable=true,priority=700,prefix=,suffix=,branch=dev
            type=raw,enable=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'schedule' }},priority=200,prefix=,suffix=,value=latest
            type=raw,enable=${{ startsWith(github.ref, 'refs/tags/') }},priority=200,prefix=,suffix=,value=latest
            type=schedule,enable=true,priority=1000,prefix=,suffix=,pattern=nightly
            type=raw,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')) }},priority=900,prefix=,suffix=,value=${{ steps.frp.outputs.version }}
            type=raw,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')) }},priority=850,prefix=,suffix=,value=${{ steps.frp.outputs.minor }}
            type=match,enable=true,priority=800,prefix=,suffix=,pattern=\d+.\d+.\d+,group=0,value=
            type=match,enable=true,priority=800,prefix=,suffix=,pattern=\d+.\d+,group=0,value=
            type=match,enable=${{ !startsWith(github.ref, 'refs/tags/0.') && !startsWith(github.ref, 'refs/tags/v0.') && !startsWith(github.ref, 'refs/tags/V0.') && !startsWith(github.ref, 'refs/tags/alpine-0.') && !startsWith(github.ref, 'refs/tags/alpine-v0.') && !startsWith(github.ref, 'refs/tags/alpine-V0.') }},priority=800,prefix=,suffix=,pattern=\d+,group=0,value=
            type=ref,enable=${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && github.event_name != 'schedule' }},priority=600,prefix=,suffix=-alpine,event=branch
            type=edge,enable=true,priority=700,prefix=,suffix=-alpine,branch=dev
            type=raw,enable=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'schedule' }},priority=200,prefix=,suffix=,value=alpine
            type=raw,enable=${{ startsWith(github.ref, 'refs/tags/') }},priority=200,prefix=,suffix=,value=alpine
            type=schedule,enable=true,priority=1000,prefix=,suffix=-alpine,pattern=nightly
            type=raw,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')) }},priority=900,prefix=,suffix=-alpine,value=${{ steps.frp.outputs.version }}
            type=raw,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')) }},priority=850,prefix=,suffix=-alpine,value=${{ steps.frp.outputs.minor }}
            type=match,enable=true,priority=800,prefix=,suffix=-alpine,pattern=\d+.\d+.\d+,group=0,value=
            type=match,enable=true,priority=800,prefix=,suffix=-alpine,pattern=\d+.\d+,group=0,value=
            type=match,enable=${{ !startsWith(github.ref, 'refs/tags/0.') && !startsWith(github.ref, 'refs/tags/v0.') && !startsWith(github.ref, 'refs/tags/V0.') && !startsWith(github.ref, 'refs/tags/alpine-0.') && !startsWith(github.ref, 'refs/tags/alpine-v0.') && !startsWith(github.ref, 'refs/tags/alpine-V0.') }},priority=800,prefix=,suffix=-alpine,pattern=\d+,group=0,value=
            type=ref,enable=${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && github.event_name != 'schedule' }},priority=600,prefix=,suffix=-alpine3.23,event=branch
            type=edge,enable=true,priority=700,prefix=,suffix=-alpine3.23,branch=dev
            type=raw,enable=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'schedule' }},priority=200,prefix=,suffix=,value=alpine3.23
            type=raw,enable=${{ startsWith(github.ref, 'refs/tags/') }},priority=200,prefix=,suffix=,value=alpine3.23
            type=schedule,enable=true,priority=1000,prefix=,suffix=-alpine3.23,pattern=nightly
            type=raw,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')) }},priority=900,prefix=,suffix=-alpine3.23,value=${{ steps.frp.outputs.version }}
            type=raw,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')) }},priority=850,prefix=,suffix=-alpine3.23,value=${{ steps.frp.outputs.minor }}
            type=match,enable=true,priority=800,prefix=,suffix=-alpine3.23,pattern=\d+.\d+.\d+,group=0,value=
            type=match,enable=true,priority=800,prefix=,suffix=-alpine3.23,pattern=\d+.\d+,group=0,value=
            type=match,enable=${{ !startsWith(github.ref, 'refs/tags/0.') && !startsWith(github.ref, 'refs/tags/v0.') && !startsWith(github.ref, 'refs/tags/V0.') && !startsWith(github.ref, 'refs/tags/alpine-0.') && !startsWith(github.ref, 'refs/tags/alpine-v0.') && !startsWith(github.ref, 'refs/tags/alpine-V0.') }},priority=800,prefix=,suffix=-alpine3.23,pattern=\d+,group=0,value=
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: alpine/frpc
          build-args: |
            FRP_VERSION=${{ steps.frp.outputs.version }}
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le,linux/riscv64,linux/s390x
          push: ${{ github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/feature/') && !startsWith(github.ref, 'refs/heads/fix/') && !startsWith(github.ref, 'refs/heads/pr/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
